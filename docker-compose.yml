version: '3.8'

services:
  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # ── Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-perekis}:${POSTGRES_PASSWORD:-perekis_secret}@postgres:5432/${POSTGRES_DB:-perekis_landing}
      REDIS_URL: redis://redis:6379
      RETAILCRM_URL: ${RETAILCRM_URL:-}
      RETAILCRM_API_KEY: ${RETAILCRM_API_KEY:-}
      NP_API_KEY: ${NP_API_KEY:-}
      LIQPAY_PUBLIC_KEY: ${LIQPAY_PUBLIC_KEY:-}
      LIQPAY_PRIVATE_KEY: ${LIQPAY_PRIVATE_KEY:-}
      GA4_MEASUREMENT_ID: ${GA4_MEASUREMENT_ID:-}
      GA4_API_SECRET: ${GA4_API_SECRET:-}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-perekis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-perekis_secret}
      POSTGRES_DB: ${POSTGRES_DB:-perekis_landing}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
