version: '3.8'

services:
  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GA4_MEASUREMENT_ID: ${GA4_MEASUREMENT_ID}
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    volumes:
      - ./data/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # ── Backend ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      RETAILCRM_URL: ${RETAILCRM_URL}
      RETAILCRM_API_KEY: ${RETAILCRM_API_KEY}
      OFFER_ID_PEROXIDE: ${OFFER_ID_PEROXIDE}
      OFFER_ID_TEST_STRIPS: ${OFFER_ID_TEST_STRIPS}
      OFFER_ID_MEASURING_CUP: ${OFFER_ID_MEASURING_CUP}
      PRICE_TYPE_BASE: ${PRICE_TYPE_BASE:-base}
      PRICE_TYPE_NASEZON: ${PRICE_TYPE_NASEZON}
      PRICE_TYPE_OPTIMAL: ${PRICE_TYPE_OPTIMAL}
      PRICE_TYPE_PRO: ${PRICE_TYPE_PRO}
      CRM_PAYMENT_TYPE_ONLINE: ${CRM_PAYMENT_TYPE_ONLINE:-liqpay}
      CRM_PAYMENT_TYPE_COD: ${CRM_PAYMENT_TYPE_COD:-cash-on-delivery}
      CRM_PAYMENT_TYPE_CASHLESS: ${CRM_PAYMENT_TYPE_CASHLESS:-bank-transfer}
      CRM_DELIVERY_TYPE_NP: ${CRM_DELIVERY_TYPE_NP:-novaposhta}
      CRM_DELIVERY_TYPE_COURIER: ${CRM_DELIVERY_TYPE_COURIER:-courier}
      CRM_DELIVERY_TYPE_PICKUP: ${CRM_DELIVERY_TYPE_PICKUP:-pickup}
      CRM_SITE_CODE: ${CRM_SITE_CODE:-landing-hlorka-ua}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      NP_API_KEY: ${NP_API_KEY}
      LIQPAY_PUBLIC_KEY: ${LIQPAY_PUBLIC_KEY}
      LIQPAY_PRIVATE_KEY: ${LIQPAY_PRIVATE_KEY}
      GA4_MEASUREMENT_ID: ${GA4_MEASUREMENT_ID}
      GA4_API_SECRET: ${GA4_API_SECRET}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:4000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
